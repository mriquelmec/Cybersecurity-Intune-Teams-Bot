name: Intune Compliance Bot 

on:
  schedule:
    # Corre cada 3 días a las 12:00 UTC (09:00 AM en Chile para horario de entrada oficina)
    - cron: '0 12 */3 * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub para probar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Compliance Bot
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TEST_GROUP_ID: ${{ secrets.TEST_GROUP_ID }}
        run: python project.py
